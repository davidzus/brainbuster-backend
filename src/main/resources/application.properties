# Database configuration - Environment variables ile override edilebilir
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/brainbusterdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rootroot}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server port - Render otomatik olarak PORT environment variable atar
server.port=${PORT:8080}

# Connection pool settings for production
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=300000

# MySQL connection parameters
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/brainbusterdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}